[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["App.tsx", "index.tsx", "index.html", "components/**", "styles/**", "services/**", "config/**", "vite.config.ts", "package.json"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
