# Backend Express — jedyne źródło prawdy dla Railway (root = ten repo)
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["Dockerfile", "server/**", "config/**", "types.ts", "railway.toml"]

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
